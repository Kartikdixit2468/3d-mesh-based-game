<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Three.js OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body class="bg-gray-100 h-screen w-screen flex items-center justify-center font-sans overflow-hidden">

    <!-- Container for the 3D Scene -->
    <div class="relative w-full max-w-md h-96 rounded-xl shadow-2xl border border-gray-200 cursor-move overflow-hidden" 
         style="background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);">
        
        <!-- Three.js will attach its canvas here -->
        <div id="threeContainer" class="absolute inset-0"></div>
        
        <!-- Helpful overlay text -->
        <div class="absolute bottom-4 left-0 w-full text-center text-sm font-bold text-gray-700 opacity-60 pointer-events-none">
            Drag to rotate model
        </div>
    </div>

    <script>
        // Colors from the game
        const C_BLUE = '#38bdf8';
        const C_ORANGE = '#fbbf24';
        const C_GREEN = '#34d399';

        const container = document.getElementById('threeContainer');

        // 1. Scene Setup
        const scene = new THREE.Scene();

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(3, 4, 5); // Initial viewing angle

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // 4. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // 5. Controls (This handles the dragging/rotating)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Adds smooth momentum
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;    // Allow scrolling to zoom
        controls.minDistance = 2;
        controls.maxDistance = 15;

        // 6. Geometry & Material (The Box)
        const geometry = new THREE.BoxGeometry(1, 3, 1);
        
        // Map colors to the 6 faces: Right, Left, Top, Bottom, Front, Back
        const colors = [C_ORANGE, C_ORANGE, C_GREEN, C_GREEN, C_BLUE, C_BLUE];
        const materials = colors.map(color => new THREE.MeshStandardMaterial({ 
            color: color,
            roughness: 0.6,
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        }));
        
        const mesh = new THREE.Mesh(geometry, materials);
        
        // 7. Add Cartoon Edges
        const edgesGeometry = new THREE.EdgesGeometry(geometry);
        const edgesMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        const edges = new THREE.LineSegments(edgesGeometry, edgesMaterial);
        mesh.add(edges);
        
        scene.add(mesh);

        // Make sure the camera looks at the center
        controls.target.set(0, 0, 0);

        // 8. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for damping to work
            renderer.render(scene, camera);
        }

        // 9. Handle Window Resizing
        window.addEventListener('resize', () => {
            if (container.clientWidth > 0) {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        });

        // Start the engine
        animate();
    </script>
</body>
</html>
